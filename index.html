<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ziyad Web Studio</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3953bd",
            "on-primary": "#ffffff",
            "surface": "#effcff",
            "on-surface": "#0f1e21",
            "on-surface-variant": "#444653",
            "outline-variant": "#c5c5d5",
            "background": "#F0F4F8"
          },
          fontFamily: {
            "headline-md": ["Manrope"],
            "headline-lg": ["Manrope"],
            "body-lg": ["Inter"],
            "body-sm": ["Inter"],
            "label-caps": ["Inter"],
            "label-sm": ["Inter"]
          }
        }
      }
    }
    </script>
</head>
<body class="text-on-surface antialiased min-h-screen flex flex-col">

    <div id="view-main" class="view active flex-col min-h-screen">
        <header class="bg-transparent top-0 w-full z-50">
            <div class="flex justify-between items-center max-w-[640px] mx-auto px-6 py-4 w-full">
                <div id="studio-title" class="text-xl font-bold text-slate-900 font-headline-md">Ziyad Studio</div>
                <button aria-label="Share" class="text-slate-600">
                    <span class="material-symbols-outlined">share</span>
                </button>
            </div>
        </header>

        <main class="flex-grow w-full max-w-[640px] mx-auto px-6 pt-8 pb-8 flex flex-col items-center gap-8">
            <section class="flex flex-col items-center text-center gap-4 w-full">
                <div class="w-24 h-24 rounded-full border-4 border-on-surface overflow-hidden shadow-lg">
                    <img src="https://raw.githubusercontent.com/Ziyad-web-studio/Assets/refs/heads/main/Images/Black%20and%20White%20Minimalist%20Fashion%20Z%20L%20Letter%20Logo.png" alt="Logo"/>
                </div>
                <div>
                    <h1 class="font-headline-lg text-2xl text-on-surface">Ziyad Web Studio</h1>
                    <div class="bg-primary text-on-primary rounded-full px-4 py-1 mt-2 inline-block">
                        <span class="text-xs font-bold uppercase tracking-wider">Link & Resources</span>
                    </div>
                </div>
            </section>

            <section class="w-full flex flex-col gap-4">
                <button onclick="goTo('view-category')" class="link-card">
                    <div class="flex items-center gap-4">
                        <div class="card-icon-wrap"><span class="material-symbols-outlined">folder_open</span></div>
                        <div class="text-left">
                            <p class="font-bold">My Folder & Project</p>
                            <p class="text-sm opacity-70">Kumpulan file & resources</p>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-outline-variant">chevron_right</span>
                </button>
                </section>
        </main>
    </div>

    <div id="view-category" class="view flex-col min-h-screen">
        <header class="bg-transparent w-full">
            <div class="flex justify-between items-center max-w-[640px] mx-auto px-6 py-4 w-full">
                <div class="flex items-center gap-3">
                    <button onclick="goBack('view-main')" class="nav-btn">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </button>
                    <span class="text-xl font-bold">Daftar Kategori</span>
                </div>
                <button onclick="goTo('view-main', 'slide-back')" class="nav-btn">
                    <span class="material-symbols-outlined">home</span>
                </button>
            </div>
        </header>
        <main class="max-w-[640px] mx-auto w-full px-6 py-4">
            <button onclick="goTo('view-code')" class="link-card">
                <div class="flex items-center gap-4">
                    <div class="card-icon-wrap"><span class="material-symbols-outlined">code</span></div>
                    <div class="text-left">
                        <p class="font-bold">Bahan Buat Aplikasi</p>
                    </div>
                </div>
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
        </main>
    </div>

    <div id="view-code" class="view flex-col min-h-screen">
        <header class="bg-transparent w-full">
            <div class="flex justify-between items-center max-w-[640px] mx-auto px-6 py-4 w-full">
                <div class="flex items-center gap-3">
                    <button onclick="goBack('view-category')" class="nav-btn">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </button>
                    <span class="text-xl font-bold">On Activity Create</span>
                </div>
                <button onclick="goTo('view-main', 'slide-back')" class="nav-btn">
                    <span class="material-symbols-outlined">home</span>
                </button>
            </div>
        </header>
        <main class="max-w-[640px] mx-auto w-full px-6 py-4 flex flex-col gap-4">
            <div class="copy-box">
                <span class="copy-label">◈ Webview Path</span>
                <div class="code-wrapper">
                    <div id="text-path" class="code-content">file:///android_asset/index.html</div>
                    <button class="copy-btn" onclick="copyText('text-path', this)"><i class="fas fa-copy"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
