<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aiminizer | Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen w-full flex flex-col">

    <!-- Background Orbs -->
    <div class="orb w-48 h-48 bg-orange-600 top-[-10%] left-[-10%]"></div>
    <div class="orb w-64 h-64 bg-zinc-800 bottom-[-10%] right-[-10%]"></div>

    <!-- Header -->
    <header class="fixed top-2 left-1/2 -translate-x-1/2 w-[92%] h-14 glass rounded-2xl z-50 flex items-center justify-between px-4 shadow-lg">
        <button onclick="toggleSettings()" class="p-2 active:opacity-50">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <div class="text-center">
            <h1 class="text-md font-bold leading-none">Aiminizer</h1>
            <p class="text-[9px] opacity-40 uppercase tracking-tighter">ziyad_studio</p>
        </div>
        <select id="modelSelect" class="bg-transparent text-xs font-semibold focus:outline-none border-none">
            <option value="gpt-3.5-turbo">GPT-3.5</option>
            <option value="deepseek-chat">DeepSeek</option>
        </select>
    </header>

    <!-- Chat Area -->
    <main id="chatContainer" class="flex-1 w-full pt-20 pb-24 px-4 overflow-y-auto hide-scroll flex flex-col gap-4">
    </main>

    <!-- Input Bar -->
    <div class="fixed bottom-0 w-full px-3 pb-4 safe-pb glass-none bg-gradient-to-t from-[var(--bg)] to-transparent">
        <div class="glass rounded-[28px] p-1.5 flex items-end gap-2 shadow-xl">
            <textarea id="userInput" rows="1" placeholder="Pesan..." 
                class="flex-1 bg-transparent border-none focus:ring-0 resize-none py-3 px-4 text-[15px] max-h-32"
                oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea>
            <button onclick="sendMessage()" class="bg-[var(--accent)] text-white w-11 h-11 rounded-full flex items-center justify-center active:scale-90 transition shadow-lg">
                <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="fixed inset-0 z-[60] invisible overflow-hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity opacity-0" id="overlay" onclick="toggleSettings()"></div>
        <div class="absolute left-0 top-0 h-full w-[85%] max-w-sm glass border-r border-white/10 p-6 flex flex-col gap-5 shadow-2xl transition-transform -translate-x-full" id="settingsContent">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-black">Panel Kontrol</h2>
                <button onclick="toggleSettings()" class="opacity-50"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase opacity-40 font-bold ml-1">Tampilan</label>
                    <button onclick="toggleTheme()" class="w-full h-12 glass rounded-xl flex items-center justify-between px-4 active:bg-white/10">
                        <span class="text-sm">Ganti Tema</span>
                        <i data-lucide="moon" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] uppercase opacity-40 font-bold ml-1">API Key</label>
                    <input type="password" id="apiKey" class="w-full h-12 glass rounded-xl px-4 text-sm focus:ring-1 ring-orange-500 outline-none" placeholder="Masukkan Key...">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] uppercase opacity-40 font-bold ml-1">Sistem</label>
                    <textarea id="systemPrompt" rows="3" class="w-full p-4 glass rounded-xl text-xs outline-none resize-none" placeholder="Instruksi AI..."></textarea>
                </div>
            </div>

            <button onclick="saveSettings()" class="mt-auto h-14 bg-[var(--accent)] text-white rounded-2xl font-bold active:opacity-80">Simpan Konfigurasi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
