<!DOCTYPE html>
<html>
<head>
  <title>Player Stat Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    input {
      margin: 6px 0;
      padding: 12px;
      width: 90%;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px;
      width: 95%;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: gold;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
    }

    .tier {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .pro { color: gold; }
    .elite { color: #22c55e; }
    .semi { color: #3b82f6; }
    .rookie { color: #ef4444; }

  </style>
</head>

<body>

<h2>Player Stat Analyzer</h2>

<div class="container">

  <input id="name" placeholder="Nama Player">

  <input id="wins" placeholder="Wins" type="number">
  <input id="podiums" placeholder="Podiums" type="number">
  <input id="poles" placeholder="Poles" type="number">
  <input id="fastest" placeholder="Fastest Laps" type="number">
  <input id="sprint" placeholder="Sprint Wins" type="number">
  <input id="starts" placeholder="Race Starts" type="number">
  <input id="titles" placeholder="World Titles" type="number">

  <button onclick="hitung()">Hitung</button>

  <div class="result" id="hasil"></div>

</div>

<script>
function hitung() {

  let name = document.getElementById("name").value || "Player";

  let wins = parseFloat(document.getElementById("wins").value) || 0;
  let podiums = parseFloat(document.getElementById("podiums").value) || 0;
  let poles = parseFloat(document.getElementById("poles").value) || 0;
  let fastest = parseFloat(document.getElementById("fastest").value) || 0;
  let sprint = parseFloat(document.getElementById("sprint").value) || 0;
  let starts = parseFloat(document.getElementById("starts").value) || 1;
  let titles = parseFloat(document.getElementById("titles").value) || 0;

  let winRate = wins / starts;
  let podiumRate = podiums / starts;
  let poleRate = poles / starts;
  let fastestRate = fastest / starts;
  let sprintRate = sprint / starts;

  let expBonus = Math.min(starts, 100) / 100 * 10;
  let titleBonus = Math.min(titles, 3) * 5;

  let score =
    (winRate * 40) +
    (podiumRate * 25) +
    (poleRate * 10) +
    (fastestRate * 10) + // x2
    (sprintRate * 10) +  // x2
    expBonus +
    titleBonus;

  let tier = "";
  let tierClass = "";

  if (score >= 80) {
    tier = "PRO";
    tierClass = "pro";
  } else if (score >= 65) {
    tier = "ELITE";
    tierClass = "elite";
  } else if (score >= 50) {
    tier = "SEMI PRO";
    tierClass = "semi";
  } else {
    tier = "ROOKIE";
    tierClass = "rookie";
  }

  document.getElementById("hasil").innerHTML =
    "<b>" + name + "</b><br><br>" +
    "Score: " + score.toFixed(2) +
    "<div class='tier " + tierClass + "'>" + tier + "</div>";
}
</script>

</body>
</html>
